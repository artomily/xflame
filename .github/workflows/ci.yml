name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  contract:
    name: Contract tests + wasm build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contract
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contract

      - name: Run tests
        run: cargo test --workspace

      - name: Build wasm (splitter)
        run: cargo build --release --target wasm32v1-none -p splitter

      - name: Build wasm (vault)
        run: cargo build --release --target wasm32v1-none -p vault

  frontend:
    name: Frontend typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck + build
        run: npm run build
